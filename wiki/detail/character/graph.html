<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>关系图示例</title>
    <!-- 引入 ECharts 库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #2f2d2d; /* 配合您图片中的黑色背景 */
            overflow: hidden;
        }
        #chart-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="chart-container"></div>

    <script>
        var chartDom = document.getElementById('chart-container');
        var myChart = echarts.init(chartDom);
        
        var option = {
            tooltip: {}, // 鼠标悬浮提示
            series: [
                {
                    type: 'graph',
                    layout: 'force', // 使用力导向布局，使节点自动散开
                    draggable: true, // 开启节点拖拽
                    roam: true,      // 允许鼠标滚轮缩放、拖拽平移画布
                    label: {
                        show: true,
                        position: 'bottom', // 文字显示在节点下方
                        color: '#fff'       // 文字颜色
                    },
                    force: {
                        repulsion: 1200,    // 节点之间的斥力，值越大离得越远
                        edgeLength: 140,     // 连线的初始长度
                        gravity:0.1
                    },
                    lineStyle: {
                        color: '#aaa',
                        width: 1.5,
                        curveness: 0.15     // 连线稍微弯曲，防止双向关系线完全重合
                    },
                    edgeSymbol: ['none', 'arrow'], // 连线末端显示箭头
                    edgeSymbolSize: [4, 8],
                    edgeLabel: {
                        show: true,
                        color: '#fff',
                        fontSize: 11,
                        formatter: function(params) {
                            return params.data.relation || ''; // 显示关系文字
                        }
                    },
                    // 节点数据
                    data: [
                        {
                            name: '槐安',
                            symbolSize: 50,
                            itemStyle: { color: '#ff0033' }
                        },
                        {
                            name: '槐梦/希碧尔',
                            // 可以用实际的图片URL代替，格式为 'image://图片链接'
                            symbol: 'image://https://fastly.jsdelivr.net/gh/apache/echarts-website@asf-site/zh/images/favicon.png', 
                            symbolSize: 50
                        },
                        {
                            name: '西格莉德',
                            symbol: 'image://https://fastly.jsdelivr.net/gh/apache/echarts-website@asf-site/zh/images/favicon.png',
                            symbolSize: 50
                        },
                        {
                            name: '茶蘼',
                            symbolSize: 50,
                            itemStyle: { color: '#333', borderColor: '#fff', borderWidth: 2 } // 空白圆圈样式
                        },
                        {
                            name: '赫塔',
                            symbolSize: 50,
                            itemStyle: { color: '#00B3FF' },
                            url: 'https://www.google.com'
                        },
                        {
                            name: '霜信',
                            symbolSize: 50,
                            itemStyle: { color: '#ff0033' }
                        },
                        {
                            name: '赫克托',
                            symbolSize: 50,
                            itemStyle: { color: '#ff0033' }
                        },
                        {
                            name: '玄烛',
                            symbolSize: 50,
                            itemStyle: { color: '#ff0033' }
                        },
                        {
                            name: '阿德里安',
                            symbolSize: 50,
                            itemStyle: { color: '#ff0033' }
                        },
                        {
                            name: '莱薇',
                            symbolSize: 50,
                            itemStyle: { color: '#ff0033' }
                        },
                        {
                            name: '无咎',
                            symbolSize: 50,
                            itemStyle: { color: '#ff0033' }
                        },
                    ],
                    // 关系连线
                    links: [
                        {
                            source: '槐梦/希碧尔',
                            target: '槐安',
                            relation: '女',
                            lineStyle: { color: '#ff6666' },
                            label: {
                                show: true,
                                color: '#ff6666'
                            }
                        },
                        {
                            source: '槐梦/希碧尔',
                            target: '西格莉德',
                            relation: '同学'
                        },
                        {
                            source: '槐梦/希碧尔',
                            target: '茶蘼',
                            relation: '女',
                            lineStyle: { color: '#ff6666' },
                            label: {
                                show: true,
                                color: '#ff6666'
                            }
                        },
                        {
                            source: '槐梦/希碧尔',
                            target: '玄烛',
                            relation: '学生'
                        },
                        {
                            source: '槐梦/希碧尔',
                            target: '莱薇',
                            relation: '闺蜜',
                            lineStyle: { color: '#FF03FF' },
                            label: {
                                show: true,
                                color: '#FF03FF'
                            }
                            
                        },
                        {
                            source: '槐安',
                            target: '槐梦/希碧尔',
                            relation: '父',
                            lineStyle: { color: '#ff6666' },
                            label: {
                                show: true,
                                color: '#ff6666'
                            }
                        },
                        {
                            source: '槐安',
                            target: '茶蘼',
                            relation: 'cp',
                            lineStyle: { color: '#FF03FF' },
                            label: {
                                show: true,
                                color: '#FF03FF'
                            }
                        },
                        {
                            source: '槐安',
                            target: '玄烛',
                            relation: '同事'
                        },
                        {
                            source: '西格莉德',
                            target: '槐梦/希碧尔',
                            relation: '同学'
                        },
                        {
                            source: '西格莉德',
                            target: '赫塔',
                            relation: 'cp',
                            lineStyle: { color: '#FF03FF' },
                            label: {
                                show: true,
                                color: '#FF03FF'
                            }
                        },
                        {
                            source: '西格莉德',
                            target: '霜信',
                            relation: '同事'
                        },
                        {
                            source: '西格莉德',
                            target: '赫克托',
                            relation: '同事'
                        },
                        {
                            source: '茶蘼',
                            target: '槐梦/希碧尔',
                            relation: '父',
                            lineStyle: { color: '#ff6666' },
                            label: {
                                show: true,
                                color: '#ff6666'
                            }
                        },
                        {
                            source: '茶蘼',
                            target: '槐安',
                            relation: 'cp',
                            lineStyle: { color: '#FF03FF' },
                            label: {
                                show: true,
                                color: '#FF03FF'
                            }
                        },
                        {
                            source: '玄烛',
                            target: '槐梦/希碧尔',
                            relation: '老师'
                        },
                        {
                            source: '玄烛',
                            target: '槐安',
                            relation: '同事'
                        },
                        {
                            source: '玄烛',
                            target: '阿德里安',
                            relation: '师傅',
                            lineStyle: { color: '#FF03FF' },
                            label: {
                                show: true,
                                color: '#FF03FF'
                            }
                        },
                        {
                            source: '霜信',
                            target: '赫克托',
                            relation: '同事'
                        },
                        {
                            source: '霜信',
                            target: '西格莉德',
                            relation: '同事'
                        },
                        {
                            source: '赫克托',
                            target: '西格莉德',
                            relation: '同事'
                        },
                        {
                            source: '赫克托',
                            target: '霜信',
                            relation: '同事'
                        },
                        {
                            source: '赫克托',
                            target: '无咎',
                            relation: 'cp',
                            lineStyle: { color: '#FF03FF' },
                            label: {
                                show: true,
                                color: '#FF03FF'
                            }
                        },
                        {
                            source: '赫塔',
                            target: '西格莉德',
                            relation: 'cp',
                            lineStyle: { color: '#FF03FF' },
                            label: {
                                show: true,
                                color: '#FF03FF'
                            }
                        },
                        {
                            source: '无咎',
                            target: '赫克托',
                            relation: 'cp',
                            lineStyle: { color: '#FF03FF' },
                            label: {
                                show: true,
                                color: '#FF03FF'
                            }
                        },
                        {
                            source: '阿德里安',
                            target: '玄烛',
                            relation: '徒弟',
                            lineStyle: { color: '#FF03FF' },
                            label: {
                                show: true,
                                color: '#FF03FF'
                            }
                        },
                        {
                            source: '莱薇',
                            target: '槐梦/希碧尔',
                            relation: '闺蜜',
                            lineStyle: { color: '#FF03FF' },
                            label: {
                                show: true,
                                color: '#FF03FF'
                            }
                        },
                    ]
                }
            ]
        };

        myChart.setOption(option);

        // 监听 ECharts 的双击事件
        myChart.on('dblclick', function (params) {
            // 判断双击的是否是“节点”（排除双击连线或空白处）
            if (params.dataType === 'node') {
                // 获取该节点数据中配置的 url
                var url = params.data.url;
                if (url) {
                    // 在新窗口/新标签页中打开链接
                    window.open(url, '_blank');
                    
                    // 如果希望在当前页面直接跳转，可以使用下面这行代码代替：
                    // window.location.href = url;
                }
            }
        });

        // 自适应窗口大小
        window.addEventListener('resize', function() {
            myChart.resize();
        });
    </script>
</body>
</html>
