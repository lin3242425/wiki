<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>世界观设定 - 分类页面</title>
    <style>
        body {
            font-family: -apple-system, sans-serif;
            background-color: #f6f6f6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
        }
        h1 { margin: 0; font-size: 28px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
        
        /* 字母导航栏 */
        .alphabet-nav {
            font-size: 14px;
            word-break: break-all;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }
        .alphabet-nav a {
            color: #0076a3;
            text-decoration: none;
            margin: 0 4px;
            font-weight: bold;
        }
        
        /* 多列网格布局 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 两列排版 */
            gap: 20px;
        }
        
        /* 首字分组块 */
        .group-box {
            border-top: 1px solid #ccc;
            padding-top: 10px;
            margin-bottom: 15px;
        }
        .group-title {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .group-item {
            font-size: 14px;
            margin-bottom: 5px;
        }
        .group-item a {
            color: #0076a3;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>世界观设定</h1>
        <div class="subtitle">分类页面</div>
        
        <!-- 分组列表 -->
        <div class="grid-container">

            <div class="group-box">
                <div class="group-title">A</div>
                <div class="group-item"><a href="#">啊</a></div>
            </div>
            
            <div class="group-box">
                <div class="group-title">B</div>
                <div class="group-item"><a href="#">八</a></div>
            </div>
            
            <div class="group-box">
                <div class="group-title">C</div>
                <div class="group-item"><a href="graph.html">词</a></div>
            </div>
            
            <div class="group-box">
                <div class="group-title">D</div>
                <div class="group-item"><a href="#">得</a></div>
                <div class="group-item"><a href="#">道</a></div>
                <div class="group-item"><a href="#">多</a></div>
            </div>

            <div class="group-box">
                <div class="group-title">E</div>
                <div class="group-item"><a href="#">鹅</a></div>
            </div>

            <div class="group-box">
                <div class="group-title">F</div>
                <div class="group-item"><a href="#">法</a></div>
            </div>
        </div>
    </div>
</body>
</html>
